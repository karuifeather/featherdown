name: Release

on:
  push:
    tags:
      - 'v*.*.*'

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  validate:
    uses: ./.github/workflows/validate-reusable.yml

  verify-tag:
    name: Verify tag matches package versions
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Verify release version
        run: node scripts/verify-release-version.mjs
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}

  publish-npm:
    name: Publish to npm (OIDC)
    needs: verify-tag
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Use npm with trusted publishing support
        run: npm install -g npm@^11.5.1

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish to npm
        run: npm publish --provenance --access public --ignore-scripts

  publish-jsr:
    name: Publish to JSR (OIDC)
    needs: publish-npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Publish to JSR
        run: npx jsr publish
