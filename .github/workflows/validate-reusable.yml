name: Validate

on:
  workflow_call:

jobs:
  validate:
    name: Build, test, and pack check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium (Mermaid / Node tests)
        run: npx playwright install --with-deps chromium

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Export smoke tests
        run: npm run test:exports

      - name: Pack (dry run)
        run: npm pack --dry-run
